version: '3.8'

# 仓库管理系统 - Docker Compose 生产部署
# 使用方法：docker compose up -d

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:4.4
    container_name: wms-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=warehouse
    networks:
      - wms-network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wms-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/warehouse
      - PORT=3000
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      # OCR训练数据持久化（可挂载自定义traineddata）
      - ./backend/chi_sim.traineddata:/app/chi_sim.traineddata:ro
      - ./backend/eng.traineddata:/app/eng.traineddata:ro
    networks:
      - wms-network

  # 前端服务（Nginx）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - wms-network

volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

networks:
  wms-network:
    driver: bridge
